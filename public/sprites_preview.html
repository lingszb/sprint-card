            ` .-.-.-.\n(  -   - )\n \\  вҲӘ  /\n  \`-.-\'\n  |   |\n  ~   ~  `,

          ]
        };

        const container = document.getElementById('sprite-container');

        // Create cards for each sprite
        Object.keys(BASE_SPRITES).forEach(name => {
            const card = document.createElement('div');
            card.className = 'sprite-card';

            const title = document.createElement('div');
            title.className = 'sprite-name';
            title.textContent = name;

            const ascii = document.createElement('div');
            ascii.className = 'sprite-ascii';
            ascii.id = `sprite-${name}`;

            card.appendChild(title);
            card.appendChild(ascii);
            container.appendChild(card);
        });

        // Animation logic
        let frame = 0;
        setInterval(() => {
            Object.entries(BASE_SPRITES).forEach(([name, frames]) => {
                document.getElementById(`sprite-${name}`).textContent = frames[frame];
            });
            frame = (frame + 1) % 3;
        }, 400);
    </script>
</body>
